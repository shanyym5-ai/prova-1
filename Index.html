<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto — Bar · Ristorante · Cocktail · Lugano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jost:wght@200;300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#211913; --bg2:#2a2016; --bg3:#332818;
  --crema:#efe4cf; --sabbia:#d9c49c; --sabbia2:#eaddc0;
  --muted:#a8977d; --linea:rgba(217,196,156,.28);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--crema);font-family:'Jost',sans-serif;font-weight:300;letter-spacing:.02em;line-height:1.65;overflow-x:hidden}
::selection{background:var(--sabbia);color:var(--bg)}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.wrap{width:min(1180px,92%);margin:0 auto}
h1,h2,h3{font-family:'Italiana',serif;font-weight:400;line-height:1.08}
.script{font-family:'Pinyon Script',cursive;color:var(--sabbia2)}
.eyebrow{font-size:.72rem;letter-spacing:.5em;text-transform:uppercase;color:var(--sabbia);display:flex;align-items:center;gap:1rem;justify-content:center}
.eyebrow::before,.eyebrow::after{content:"";height:1px;width:42px;background:var(--linea)}
.btn{display:inline-block;padding:.9rem 2.6rem;border:1px solid var(--sabbia);color:var(--sabbia2);font-size:.78rem;letter-spacing:.35em;text-transform:uppercase;background:transparent;cursor:pointer;transition:.4s}
.btn:hover{background:var(--sabbia);color:var(--bg)}
.btn.solid{background:var(--sabbia);color:var(--bg)}
.btn.solid:hover{background:var(--sabbia2)}
.reveal{opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s ease}
.reveal.in{opacity:1;transform:none}
.frame{pointer-events:none;position:fixed;inset:14px;border:1px solid rgba(217,196,156,.16);z-index:60}
.frame::before,.frame::after{content:"";position:absolute;width:26px;height:26px;border:1px solid var(--sabbia)}
.frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
@media(max-width:640px){.frame{inset:8px}}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:1.1rem 0;transition:.4s}
nav.scrolled{background:rgba(33,25,19,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--linea)}
.nav-inner{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:.9rem}
.logo-badge{width:52px;height:52px;border-radius:50%;background:var(--sabbia2);color:#2a2016;display:flex;align-items:center;justify-content:center;font-family:'Italiana',serif;font-size:1rem;letter-spacing:.06em;line-height:.95;text-align:center;box-shadow:0 0 0 1px rgba(217,196,156,.5),0 0 0 5px rgba(217,196,156,.12)}
.logo-txt{line-height:1.05}
.logo-txt b{font-family:'Italiana',serif;font-weight:400;font-size:1.45rem;letter-spacing:.3em;color:var(--sabbia2);display:block}
.logo-txt small{font-size:.56rem;letter-spacing:.42em;text-transform:uppercase;color:var(--muted)}
.nav-links{display:flex;gap:2rem;font-size:.7rem;letter-spacing:.26em;text-transform:uppercase}
.nav-links a{color:var(--muted);transition:.3s;padding-bottom:4px;border-bottom:1px solid transparent}
.nav-links a:hover{color:var(--sabbia2);border-color:var(--sabbia)}
.nav-cta{font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;border:1px solid var(--sabbia);padding:.55rem 1.3rem;color:var(--sabbia2);transition:.3s}
.nav-cta:hover{background:var(--sabbia);color:var(--bg)}
.burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:6px;padding:6px}
.burger span{width:26px;height:1px;background:var(--sabbia2);display:block}
@media(max-width:980px){
  .nav-links,.nav-cta{display:none}
  .burger{display:flex}
  .nav-links.open{display:flex;position:fixed;inset:0;background:rgba(33,25,19,.97);flex-direction:column;align-items:center;justify-content:center;gap:2.2rem;font-size:1rem;z-index:70}
}

/* hero video */
header{min-height:100svh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;isolation:isolate;padding:7rem 0 5rem;overflow:hidden}
.hero-video{position:absolute;inset:0;z-index:-2}
.hero-video video{width:100%;height:100%;object-fit:cover;filter:brightness(.85)}
.hero-video::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,rgba(217,196,156,.08),transparent 55%),linear-gradient(rgba(33,25,19,.45),rgba(33,25,19,.93))}
.hero-inner{max-width:860px;padding:0 1.2rem}
.hero-badge{display:inline-flex;align-items:center;gap:.7rem;border:1px solid var(--linea);padding:.45rem 1.2rem;font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sabbia2);margin-bottom:1.6rem;background:rgba(33,25,19,.4)}
.hero-badge b{color:#f2c14e;font-weight:500;letter-spacing:.1em}
h1{font-size:clamp(3.4rem,11vw,7.2rem);letter-spacing:.22em;color:#fff;text-transform:uppercase;margin-left:.22em}
.hero-tag{font-size:.78rem;letter-spacing:.55em;text-transform:uppercase;color:var(--sabbia);margin-top:.4rem}
.hero-sub{margin:1.8rem auto 2.6rem;color:#cfc2ab;max-width:560px;font-size:1rem}
.hero-ctas{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}
.hero-meta{position:absolute;bottom:2.4rem;left:0;right:0;display:flex;justify-content:center;gap:3.2rem;flex-wrap:wrap;font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.hero-meta span b{color:var(--sabbia);font-weight:400;display:block;letter-spacing:.38em;margin-bottom:.2rem}

section{padding:6.5rem 0}
.sec-head{text-align:center;margin-bottom:3.4rem}
.sec-head h2{font-size:clamp(2.2rem,5.5vw,3.6rem);margin-top:1rem;letter-spacing:.1em;text-transform:uppercase}
.sec-head p{color:var(--muted);max-width:620px;margin:1rem auto 0}

/* locale */
#locale{background:var(--bg2)}
.loc-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:4rem;align-items:center}
.loc-foto{position:relative}
.loc-foto img{width:100%;height:540px;object-fit:cover;filter:saturate(.95) brightness(.9)}
.loc-foto::after{content:"";position:absolute;inset:-16px;border:1px solid var(--linea);z-index:-1;transform:translate(16px,16px)}
.loc-txt .eyebrow{justify-content:flex-start}.loc-txt .eyebrow::after{display:none}
.loc-txt h2{font-size:clamp(2rem,4.5vw,3rem);margin:.8rem 0 1.4rem;letter-spacing:.08em;text-transform:uppercase}
.loc-txt p{color:var(--muted);margin-bottom:1.1rem}
.loc-stats{display:flex;gap:2.6rem;margin-top:2rem;flex-wrap:wrap}
.loc-stats div b{font-family:'Italiana',serif;font-size:2.1rem;color:var(--sabbia2);display:block}
.loc-stats div span{font-size:.64rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
.loc-feat{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:1.8rem}
.loc-feat span{border:1px solid var(--linea);padding:.4rem 1rem;font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--sabbia)}
@media(max-width:900px){.loc-grid{grid-template-columns:1fr}.loc-foto img{height:380px}}

/* menu */
.tabs{display:flex;justify-content:center;gap:.3rem;flex-wrap:wrap;margin-bottom:3rem;border-top:1px solid var(--linea);border-bottom:1px solid var(--linea);padding:1rem 0}
.tab{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;padding:.6rem 1.1rem;transition:.3s;position:relative}
.tab:hover{color:var(--crema)}
.tab.active{color:var(--sabbia)}
.tab.active::after{content:"";position:absolute;left:1.1rem;right:1.1rem;bottom:0;height:1px;background:var(--sabbia)}
.panel{display:none;animation:fade .6s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.menu-layout{display:grid;grid-template-columns:380px 1fr;gap:3.6rem;align-items:start}
.menu-photo{position:sticky;top:110px}
.menu-photo img{width:100%;height:480px;object-fit:cover;border:1px solid var(--linea);padding:8px;background:var(--bg2)}
.mp-cap{margin-top:1rem;text-align:center;font-family:'Pinyon Script',cursive;font-size:1.5rem;color:var(--sabbia2)}
.menu-list{}
.cat{font-family:'Italiana',serif;font-size:1.9rem;letter-spacing:.22em;text-transform:uppercase;color:var(--sabbia);margin:2.4rem 0 .6rem}
.cat:first-child{margin-top:0}
.dish{padding:.85rem 0;border-bottom:1px solid rgba(217,196,156,.14)}
.dish-top{display:flex;align-items:baseline;gap:.8rem}
.dish-top h4{font-family:'Jost',sans-serif;font-weight:400;font-size:1rem;letter-spacing:.04em;color:var(--crema)}
.dish-top .dots{flex:1;border-bottom:1px dotted rgba(217,196,156,.4);transform:translateY(-4px);min-width:24px}
.dish-top .prezzo{font-family:'Italiana',serif;font-size:1.1rem;color:var(--sabbia2);white-space:nowrap}
.dish p{font-size:.82rem;color:var(--muted);font-style:italic;margin-top:.15rem}
@media(max-width:920px){.menu-layout{grid-template-columns:1fr}.menu-photo{position:static}.menu-photo img{height:300px}}

/* punto del giorno */
#giorno{padding:0}
.pg{max-width:760px;margin:0 auto;background:var(--sabbia2);color:#2a2016;text-align:center;padding:3.4rem 2.4rem;border-radius:300px 300px 0 0;position:relative}
.pg .script{color:#2a2016;font-size:2.2rem;display:block;margin-bottom:.6rem}
.pg h2{font-size:clamp(1.7rem,4vw,2.4rem);letter-spacing:.28em;text-transform:uppercase}
.pg p{max-width:440px;margin:1rem auto 0;font-size:.95rem;color:#4a3c2b}

/* gallerie */
#galleria .grid1{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:215px;gap:10px}
#galleria .grid1 figure{overflow:hidden;position:relative;margin:0}
#galleria img{width:100%;height:100%;object-fit:cover;filter:brightness(.82) saturate(.95);transition:.6s}
#galleria figure:hover img{transform:scale(1.06);filter:brightness(1)}
#galleria figcaption{position:absolute;left:0;right:0;bottom:0;padding:1.6rem 1rem .8rem;background:linear-gradient(transparent,rgba(23,17,12,.85));font-size:.64rem;letter-spacing:.26em;text-transform:uppercase;color:var(--sabbia2);text-align:center}
#galleria .grid1 figure:nth-child(1){grid-column:span 2;grid-row:span 2}
#galleria .grid1 figure:nth-child(4){grid-row:span 2}
.g-sep{margin:3.2rem 0 2.2rem;text-align:center}
@media(max-width:760px){#galleria .grid1{grid-template-columns:repeat(2,1fr)}}

/* eventi */
#eventi{background:var(--bg2)}
.ev-grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:4rem;align-items:center}
.ev-foto{position:relative}
.ev-foto img{width:100%;height:440px;object-fit:cover;filter:brightness(.92)}
.ev-foto::after{content:"";position:absolute;inset:-16px;border:1px solid var(--linea);z-index:-1;transform:translate(-16px,16px)}
.ev-txt .eyebrow{justify-content:flex-start}.ev-txt .eyebrow::after{display:none}
.ev-txt h2{font-size:clamp(2rem,4.5vw,3rem);margin:.8rem 0 1.4rem;letter-spacing:.08em;text-transform:uppercase}
.ev-txt p{color:var(--muted);margin-bottom:1.1rem}
.ev-list{margin:1.4rem 0 2rem;list-style:none}
.ev-list li{padding:.5rem 0;border-bottom:1px solid rgba(217,196,156,.14);font-size:.92rem;color:var(--crema)}
.ev-list li::before{content:"✦";color:var(--sabbia);margin-right:.8rem;font-size:.7rem}
@media(max-width:900px){.ev-grid{grid-template-columns:1fr}.ev-foto img{height:320px}}

/* mappa */
.map-shell{position:relative;max-width:1020px;margin:0 auto;border:1px solid var(--linea);padding:10px;background:var(--bg3)}
.map-shell iframe{width:100%;height:440px;border:0;display:block;filter:grayscale(.85) invert(.92) contrast(.9) sepia(.35) saturate(1.3)}
.map-badge{position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);background:var(--bg);border:1px solid var(--sabbia);padding:.8rem 2rem;text-align:center;white-space:nowrap}
.map-badge b{display:block;font-family:'Italiana',serif;font-size:1.15rem;color:var(--sabbia2);letter-spacing:.14em}
.map-badge span{font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
@media(max-width:640px){.map-shell iframe{height:320px}.map-badge{white-space:normal;width:86%}}

/* contatti */
#contatti{background:var(--bg2)}
.res-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:4rem;align-items:start}
@media(max-width:900px){.res-grid{grid-template-columns:1fr}}
.res-info .eyebrow{justify-content:flex-start}.res-info .eyebrow::after{display:none}
.res-info h2{font-size:clamp(2rem,4.5vw,3rem);margin:.8rem 0 1.4rem;letter-spacing:.08em;text-transform:uppercase}
.res-line{display:flex;gap:1.1rem;margin:1.3rem 0;align-items:flex-start}
.res-line .ic{color:var(--sabbia);font-size:1.05rem;border:1px solid var(--linea);width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.res-line b{display:block;font-weight:400;letter-spacing:.2em;text-transform:uppercase;font-size:.66rem;color:var(--sabbia);margin-bottom:.2rem}
.res-line span{color:var(--muted);font-size:.94rem}
form{border:1px solid var(--linea);padding:2.6rem 2.2rem;background:rgba(42,32,22,.75)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem}
@media(max-width:560px){.f-row{grid-template-columns:1fr}}
label{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--sabbia);display:block;margin-bottom:.45rem}
input,select,textarea{width:100%;background:transparent;border:1px solid rgba(217,196,156,.3);color:var(--crema);padding:.8rem 1rem;font-family:'Jost',sans-serif;font-weight:300;font-size:.92rem;outline:none;transition:.3s}
input:focus,select:focus,textarea:focus{border-color:var(--sabbia)}
select option{background:var(--bg2)}
form .btn{width:100%;margin-top:.6rem}
.form-note{font-size:.7rem;color:var(--muted);text-align:center;margin-top:1rem}
.socials{display:flex;gap:1rem;margin-top:2rem}
.socials.center{justify-content:center;margin:2rem 0 0}
.soc{width:48px;height:48px;border:1px solid var(--sabbia);display:flex;align-items:center;justify-content:center;color:var(--sabbia2);cursor:pointer;background:transparent;transition:.35s}
.soc:hover{background:var(--sabbia);color:var(--bg)}
.soc svg{width:20px;height:20px;fill:currentColor}

/* modali */
.modal-bk{position:fixed;inset:0;background:rgba(20,15,11,.84);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:90;padding:1.2rem}
.modal-bk.open{display:flex;animation:fade .35s ease}
.modal{background:var(--bg2);border:1px solid var(--sabbia);max-width:430px;width:100%;padding:3rem 2.4rem 2.6rem;text-align:center;position:relative}
.modal::before{content:"";position:absolute;inset:7px;border:1px solid rgba(217,196,156,.22);pointer-events:none}
.modal .m-ic{width:56px;height:56px;margin:0 auto 1.2rem;border:1px solid var(--sabbia);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sabbia2)}
.modal .m-ic svg{width:24px;height:24px;fill:currentColor}
.modal h3{font-size:1.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sabbia2);margin-bottom:.6rem}
.modal p{font-size:.88rem;color:var(--muted);margin-bottom:.4rem}
.modal .handle{font-family:'Italiana',serif;font-size:1.3rem;color:var(--crema);margin:.8rem 0 .2rem;word-break:break-all}
.modal .m-note{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(168,151,125,.75);margin-top:1.4rem}
.modal .btn{margin-top:1.6rem;padding:.7rem 2rem}
.m-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;transition:.3s;line-height:1}
.m-close:hover{color:var(--sabbia)}

/* footer */
footer{border-top:1px solid var(--linea);padding:4rem 0 6rem;background:var(--bg2);text-align:center}
.foot-logo{font-family:'Italiana',serif;font-size:2.2rem;color:var(--sabbia2);letter-spacing:.35em;margin-left:.35em}
.foot-logo small{display:block;font-family:'Jost',sans-serif;font-size:.56rem;letter-spacing:.46em;color:var(--muted);margin-top:.4rem}
.foot-links{display:flex;justify-content:center;gap:1.8rem;margin:2rem 0 0;font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);flex-wrap:wrap}
.foot-links a:hover{color:var(--sabbia2)}
.foot-copy{font-size:.7rem;color:rgba(168,151,125,.6);letter-spacing:.08em;margin-top:1.6rem}
.divider-orn{color:var(--sabbia);margin:1.6rem 0 0;letter-spacing:.6em}
</style>
</head>
<body>

<div class="frame" aria-hidden="true"></div>

<nav id="nav">
  <div class="wrap nav-inner">
    <a href="#top" class="logo">
      <span class="logo-badge">PU<br>NTO</span>
      <span class="logo-txt"><b>PUNTO</b><small>Bar · Ristorante · Cocktail</small></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="#locale">Il locale</a>
      <a href="#menu">Menu</a>
      <a href="#galleria">Galleria</a>
      <a href="#eventi">Eventi</a>
      <a href="#dove">Dove siamo</a>
      <a href="#contatti">Contatti</a>
    </div>
    <a href="#contatti" class="nav-cta">Prenota un tavolo</a>
    <button class="burger" id="burger" aria-label="Apri menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<header id="top">
  <div class="hero-video">
    <video autoplay muted loop playsinline poster="">
      <source
